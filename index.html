<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>FPS | Organized</title>
  <!-- JS -->
  <script type="module" src="./src/main_modular.js"></script>
  <link rel="stylesheet" href="./styles/style.css" />
</head>

<body>
  <div id="pre-start-screen"
    style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 2000; display: flex; align-items: center; justify-content: center; flex-direction: column;">
    <h1 style="color: white; font-family: poppins, sans-serif; margin-bottom: 20px; font-size: 3rem;">Elipsic FPS</h1>
    <button id="start-btn"
      style="padding: 15px 40px; font-size: 1.5rem; cursor: pointer; border-radius: 10px; border: none; background: #ff4d4f; color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(255, 77, 79, 0.4); transition: transform 0.2s;">ENTER
      WIDESCREEN</button>
  </div>

  <div id="splash-screen">
    <video muted id="bg-video">
      <source src="/images/2026 (1).mp4" type="video/mp4" />
    </video>
  </div>

  <div id="loading-screen" style="display: none;">
    <img src="/images/2026.png" id="bg-loading" alt="" />
    <div class="loading">
      <svg width="64px" height="48px">
        <polyline points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" id="back"></polyline>
        <polyline points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" id="front"></polyline>
      </svg>
    </div>
  </div>
  <!-- <h1>Test</h1> -->
  <div id="container"></div>
</body>

</html>
